name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  php-lint:
    name: PHP Lint (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Run Pint
        run: composer lint

      - name: Commit PHP fixes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: php code style (pint)"
          commit_options: "--no-verify"

  generate:
    name: Generate Wayfinder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate Wayfinder
        run: php artisan wayfinder:generate --with-form

      - name: Upload Wayfinder generated files
        uses: actions/upload-artifact@v4
        with:
          name: wayfinder-generated
          path: |
            resources/js/actions/
            resources/js/routes/
            resources/js/wayfinder/
          retention-days: 1

  frontend-lint:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    needs: [php-lint, generate]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true

      - name: Download Wayfinder generated files
        uses: actions/download-artifact@v4
        with:
          name: wayfinder-generated
          path: resources/js/
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format (Prettier)
        run: pnpm run format

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Commit frontend fixes
        if: github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: frontend code style (prettier/eslint)"
          commit_options: "--no-verify"

  typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download Wayfinder generated files
        uses: actions/download-artifact@v4
        with:
          name: wayfinder-generated
          path: resources/js/
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run types:check
